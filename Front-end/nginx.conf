server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index Login.html;

    location / {
        try_files $uri $uri/ /Login.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
