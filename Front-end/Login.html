<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Agent | Log in</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230066ff'%3E%3Cpath fill-rule='evenodd' d='M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z' clip-rule='evenodd'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { mono: ["Inter", "sans-serif"] },
                    colors: { brand: { cyan: "#00a8e8", blue: "#0066ff", dark: "#0f172a" } },
                    animation: { 'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)' },
                    keyframes: { slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } } }
                },
            },
        };

        function toggleVisibility(inputId, pathId) {
            const input = document.getElementById(inputId);
            const path = document.getElementById(pathId);
            const eyeSlash = "M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88";
            const eyeOpen = "M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7zM12 9a3 3 0 100 6 3 3 0 000-6z";

            if (input.type === "password") { input.type = "text"; path.setAttribute("d", eyeSlash); }
            else { input.type = "password"; path.setAttribute("d", eyeOpen); }
        }
    </script>
</head>

<body
    class="bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-blue-100 via-white to-brand-cyan/20 dark:from-slate-900 dark:via-slate-900 dark:to-brand-blue/10 h-screen flex justify-center items-center font-mono selection:bg-brand-cyan selection:text-white overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-cyan/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-brand-blue/20 rounded-full blur-[100px]"></div>

    <div
        class="relative bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-white/50 dark:border-slate-700/50 w-[420px] p-10 rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,102,255,0.15)] animate-slide-up">

        <div class="flex justify-center mb-6">
            <div
                class="h-12 w-12 bg-gradient-to-br from-brand-blue to-brand-cyan rounded-xl flex items-center justify-center shadow-lg shadow-brand-blue/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-3xl text-slate-900 dark:text-white mb-2 font-bold tracking-tight">Bingo Agent</h2>
            <p class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-widest font-bold">Secure Dashboard Access</p>
        </div>

        <!-- Server error banner -->
        <div id="serverError" class="hidden mb-5 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400 px-4 py-3 rounded-xl text-sm font-semibold"></div>

        <form id="loginForm" class="flex flex-col gap-5" novalidate>
            <div class="group">
                <label
                    class="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-widest group-focus-within:text-brand-blue transition-colors">Email
                    Address</label>

                <input id="emailInput" type="email" placeholder="admin@bingo.local" required
                    class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3.5 rounded-xl outline-none transition-all duration-300 focus:bg-white dark:focus:bg-slate-600 focus:border-brand-blue focus:ring-4 focus:ring-brand-blue/10 placeholder-slate-300 dark:placeholder-slate-500 text-sm dark:text-white" />

                <p id="emailError" class="hidden text-red-500 text-xs font-bold mt-2 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Please enter a valid email
                </p>
            </div>

            <div class="group">
                <label
                    class="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-widest group-focus-within:text-brand-blue transition-colors">Password</label>
                <div class="relative">
                    <input id="passwordInput" type="password" placeholder="••••••••" required
                        class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3.5 pr-12 rounded-xl outline-none transition-all duration-300 focus:bg-white dark:focus:bg-slate-600 focus:border-brand-blue focus:ring-4 focus:ring-brand-blue/10 placeholder-slate-300 dark:placeholder-slate-500 text-sm dark:text-white" />

                    <button type="button" onclick="toggleVisibility('passwordInput', 'eye-password')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-blue transition-colors cursor-pointer p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path id="eye-password" stroke-linecap="round" stroke-linejoin="round"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7zM12 9a3 3 0 100 6 3 3 0 000-6z" />
                        </svg>
                    </button>
                </div>

                <p id="passwordError" class="hidden text-red-500 text-xs font-bold mt-2 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Password is required
                </p>
            </div>

            <div class="flex justify-between items-center text-xs text-slate-500 dark:text-slate-400 mt-2">
                <label class="flex items-center cursor-pointer hover:text-brand-blue transition-colors select-none">
                    <input type="checkbox"
                        class="mr-2 rounded border-gray-300 text-brand-blue focus:ring-brand-blue accent-brand-blue" />
                    Remember me
                </label>
                <a href="ForgotPassword.html" class="text-brand-blue font-bold hover:underline">Forgot password?</a>
            </div>

            <button id="submitBtn" type="submit"
                class="mt-4 w-full bg-gradient-to-r from-brand-blue to-brand-cyan text-white p-4 rounded-xl font-bold text-sm tracking-widest uppercase hover:opacity-90 transition-all duration-300 shadow-xl shadow-brand-blue/20 hover:shadow-2xl hover:scale-[1.02] active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <svg id="loginSpinner" class="hidden animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                <span id="loginText">Log in</span>
            </button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (API.getToken()) window.location.href = 'Dashboard.html';

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const serverError = document.getElementById('serverError');
        const submitBtn = document.getElementById('submitBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginText = document.getElementById('loginText');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            let isValid = true;

            emailInput.classList.remove('border-red-500', 'focus:ring-red-200');
            passwordInput.classList.remove('border-red-500', 'focus:ring-red-200');
            emailError.classList.add('hidden');
            passwordError.classList.add('hidden');
            serverError.classList.add('hidden');

            if (!emailInput.value || !emailInput.value.includes('@')) {
                emailInput.classList.add('border-red-500', 'focus:ring-red-200');
                emailError.classList.remove('hidden');
                isValid = false;
            }

            if (!passwordInput.value) {
                passwordInput.classList.add('border-red-500', 'focus:ring-red-200');
                passwordError.classList.remove('hidden');
                isValid = false;
            }

            if (!isValid) return;

            submitBtn.disabled = true;
            loginSpinner.classList.remove('hidden');
            loginText.textContent = 'Signing in…';

            try {
                const res = await API.auth.login({
                    email: emailInput.value,
                    password: passwordInput.value,
                });
                API.setToken(res.token);
                localStorage.setItem('bingo_user', JSON.stringify(res.user));
                window.location.href = 'Dashboard.html';
            } catch (err) {
                serverError.textContent = err.message || 'Invalid email or password.';
                serverError.classList.remove('hidden');
                submitBtn.disabled = false;
                loginSpinner.classList.add('hidden');
                loginText.textContent = 'Log in';
            }
        });
    </script>
</body>

</html>
