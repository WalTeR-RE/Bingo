<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Agent | Forgot Password</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230066ff'%3E%3Cpath fill-rule='evenodd' d='M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z' clip-rule='evenodd'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { mono: ["Inter", "sans-serif"] },
                    colors: { brand: { cyan: "#00a8e8", blue: "#0066ff", dark: "#0f172a" } },
                    animation: { 'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)' },
                    keyframes: { slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } } }
                },
            },
        };
    </script>
</head>

<body
    class="bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-blue-100 via-white to-brand-cyan/20 dark:from-slate-900 dark:via-slate-900 dark:to-brand-blue/10 h-screen flex justify-center items-center font-mono selection:bg-brand-cyan selection:text-white overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-cyan/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-brand-blue/20 rounded-full blur-[100px]"></div>

    <div
        class="relative bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-white/50 dark:border-slate-700/50 w-[420px] p-10 rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,102,255,0.15)] animate-slide-up">

        <div class="flex justify-center mb-6">
            <div
                class="h-12 w-12 bg-gradient-to-br from-brand-blue to-brand-cyan rounded-xl flex items-center justify-center shadow-lg shadow-brand-blue/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
        </div>

        <div class="text-center mb-8">
            <h2 class="text-3xl text-slate-900 dark:text-white mb-2 font-bold tracking-tight">Forgot Password?</h2>
            <p class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-widest font-bold">Enter your email to reset it</p>
        </div>

        <div id="serverError" class="hidden mb-5 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400 px-4 py-3 rounded-xl text-sm font-semibold"></div>

        <form id="forgotForm" class="flex flex-col gap-5" novalidate>
            <div class="group">
                <label
                    class="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-widest group-focus-within:text-brand-blue transition-colors">Email
                    Address</label>
                <input id="emailInput" type="email" placeholder="admin@bingo.local" required
                    class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-3.5 rounded-xl outline-none transition-all duration-300 focus:bg-white dark:focus:bg-slate-600 focus:border-brand-blue focus:ring-4 focus:ring-brand-blue/10 placeholder-slate-300 dark:placeholder-slate-500 text-sm dark:text-white" />

                <p id="emailError" class="hidden text-red-500 text-xs font-bold mt-2 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Please enter a valid email
                </p>

                <p id="successMessage" class="hidden text-green-600 dark:text-green-400 text-xs font-bold mt-2 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    Reset link sent! Check your inbox.
                </p>
            </div>

            <button id="submitBtn" type="submit"
                class="mt-2 w-full bg-gradient-to-r from-brand-blue to-brand-cyan text-white p-4 rounded-xl font-bold text-sm tracking-widest uppercase hover:opacity-90 transition-all duration-300 shadow-xl shadow-brand-blue/20 hover:shadow-2xl hover:scale-[1.02] active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <svg id="spinner" class="hidden animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                <span id="btnText">Send Reset Link</span>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 dark:border-slate-700 pt-6">
            <p class="text-xs text-slate-400 font-bold">Remember your password?</p>
            <a href="Login.html"
                class="inline-flex items-center gap-2 text-brand-blue font-bold text-xs uppercase tracking-widest mt-3 hover:opacity-80 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Login
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('forgotForm');
        const emailInput = document.getElementById('emailInput');
        const emailError = document.getElementById('emailError');
        const successMessage = document.getElementById('successMessage');
        const serverError = document.getElementById('serverError');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            emailInput.classList.remove('border-red-500', 'focus:ring-red-200');
            emailError.classList.add('hidden');
            successMessage.classList.add('hidden');
            serverError.classList.add('hidden');

            if (!emailInput.value || !emailInput.value.includes('@')) {
                emailInput.classList.add('border-red-500', 'focus:ring-red-200');
                emailError.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Sending…';

            try {
                await API.auth.forgotPassword({ email: emailInput.value });
                successMessage.classList.remove('hidden');
                emailInput.value = '';
            } catch (err) {
                serverError.textContent = err.message || 'Something went wrong. Please try again.';
                serverError.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
